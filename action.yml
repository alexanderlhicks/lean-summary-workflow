name: PR Summary Action
description: 'Generates a summary for a Pull Request'
inputs:
  github_token:
    description: 'GitHub Token for API calls'
    required: true
  api_key:
    description: 'API key for the LLM provider'
    required: true
  provider:
    description: 'LLM provider to use: gemini, anthropic, or openai'
    required: false
    default: 'gemini'
  github_repository:
    description: 'The GitHub repository (e.g., owner/repo)'
    required: true
  pr_number:
    description: 'The Pull Request number'
    required: true
  model:
    description: 'The LLM model to use (e.g., gemini-3-flash-preview, claude-sonnet-4-20250514, gpt-4o)'
    required: true
  lean_keywords:
    description: 'Comma-separated list of Lean keywords (e.g., theorem, def) to track for declaration changes and sorries'
    required: false
    default: 'def,abbrev,example,theorem,opaque,lemma,instance,constant,axiom'
  style_guide_path:
    description: 'Optional: Path to a style guide file for adherence checking'
    required: false
    default: 'CONTRIBUTING.md'
  validate_title:
    description: 'Validate PR title against conventional commit format: type[(scope)]: subject (scope is optional)'
    required: false
    default: 'false'
  upstream_path:
    description: 'Path prefix for upstream-bound files (e.g., ToMathlib/). If changed files match, a reminder is shown.'
    required: false
    default: ''
runs:
  using: "composite"
  steps:
    - name: Checkout PR Code
      uses: actions/checkout@v6.0.2
      with:
        ref: ${{ github.event.pull_request.head.sha }}
        fetch-depth: 0 # Fetch all history to enable diffing against base

    - name: Mask secrets
      run: |
        echo "::add-mask::${{ inputs.api_key }}"
        echo "::add-mask::${{ inputs.github_token }}"
      shell: bash

    - name: Copy action requirements
      run: cp ${{ github.action_path }}/requirements.txt ./action-requirements.txt
      shell: bash

    - name: Set up Python
      uses: actions/setup-python@v6.2.0
      with:
        python-version: '3.13'
        cache: 'pip'
        cache-dependency-path: ./action-requirements.txt

    - name: Install dependencies
      run: pip install -r ./action-requirements.txt
      shell: bash

    - name: Generate diff
      run: |
        MERGE_BASE=$(git merge-base ${{ github.event.pull_request.base.sha }} HEAD)
        git diff "$MERGE_BASE" HEAD > pr.diff
      shell: bash

    - name: Generate summary
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
        API_KEY: ${{ inputs.api_key }}
        PROVIDER: ${{ inputs.provider }}
        GITHUB_REPOSITORY: ${{ inputs.github_repository }}
        PR_NUMBER: ${{ inputs.pr_number }}
        INPUT_MODEL: ${{ inputs.model }}
        INPUT_LEAN_KEYWORDS: ${{ inputs.lean_keywords }}
        INPUT_STYLE_GUIDE_PATH: ${{ inputs.style_guide_path }}
        INPUT_VALIDATE_TITLE: ${{ inputs.validate_title }}
        INPUT_UPSTREAM_PATH: ${{ inputs.upstream_path }}
      run: python ${{ github.action_path }}/summary.py
      shell: bash

    - name: Clean up artifacts
      if: always()
      run: |
        rm -f pr.diff
        rm -f ./action-requirements.txt
      shell: bash
